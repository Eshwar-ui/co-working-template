/i> Settings</a><div class="pt-4 mt-4 border-t border-white/10"><a href="../../index.html" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-400 dark:text-gray-300 hover:text-white hover:bg-white dark:bg-earth-card/5 rounded-xl transition"><i class="fas fa-arrow-left w-5"></i> Back</a></div></nav></aside>
  <div class="flex-1 lg:ml-64">
    <header class="h-16 bg-white dark:bg-earth-card border-b border-gray-100 dark:border-white/10 flex items-center justify-between px-6 sticky top-0 z-30">
      <div class="flex items-center gap-4"><button id="sidebarToggle" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-500 dark:text-gray-300"><i class="fas fa-bars"></i></button><h1 class="text-lg font-bold text-gray-900 dark:text-white">Settings</h1></div>
      <div class="flex items-center gap-3">
        <button id="rtlToggle" class="px-3 py-1.5 text-[10px] font-bold border border-gray-200 text-gray-500 dark:text-gray-300 rounded-lg hover:border-primary hover:text-primary transition uppercase tracking-wider">RTL</button>
        <button id="darkToggle" class="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-500 dark:text-gray-300 hover:text-primary transition"><i class="fas fa-moon"></i></button>

    <main class="p-6">
      <!-- Tabs -->
      <div class="flex gap-1 p-1 bg-gray-100 rounded-xl mb-8 w-fit">
        <button class="px-4 py-2 text-sm font-semibold text-white bg-primary rounded-lg">General</button>
        <button class="px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-300 hover:text-primary transition rounded-lg">Notifications</button>
        <button class="px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-300 hover:text-primary transition rounded-lg">Integrations</button>
        <button class="px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-300 hover:text-primary transition rounded-lg">Security</button>
      </div>

      <div class="grid lg:grid-cols-2 gap-8">
        <!-- General Settings -->
        <div class="bg-white dark:bg-earth-card rounded-2xl border border-gray-100 dark:border-white/10 p-6">
          <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-6">General Settings</h3>
          <form class="space-y-5" data-validate>
            <div><label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Company Name</label><input type="text" value="CoWork Hub" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition dark:bg-earth-dark dark:border-white/10 dark:text-white "></div>
            <div><label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Support Email</label><input type="email" value="support@coworkhub.com" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition dark:bg-earth-dark dark:border-white/10 dark:text-white "></div>
            <div><label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Address</label><textarea rows="2" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition resize-y dark:bg-earth-dark dark:border-white/10 dark:text-white ">123 Innovation Drive, San Francisco, CA 94107</textarea></div>
            <div class="grid grid-cols-2 gap-4">
              <div><label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Timezone</label><select class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-primary outline-none dark:bg-earth-dark dark:border-white/10 dark:text-white "><option>Pacific (UTC-8)</option><option>Eastern (UTC-5)</option><option>Central (UTC-6)</option></select></div>
              <div><label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Currency</label><select class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-primary outline-none dark:bg-earth-dark dark:border-white/10 dark:text-white "><option>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option></select></div>
            </div>
            <button type="submit" class="px-6 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-primary-dark transition-all">Save Changes</button>
          </form>
        </div>

        <!-- Notification Preferences -->
        <div class="space-y-8">
          <div class="bg-white dark:bg-earth-card rounded-2xl border border-gray-100 dark:border-white/10 p-6">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-6">Notification Preferences</h3>
            <div class="space-y-4">
              <label class="flex items-center justify-between cursor-pointer"><div><span class="font-medium text-gray-900 dark:text-white text-sm">New Member Registrations</span><p class="text-xs text-gray-500 dark:text-gray-300">Get notified when new members join</p></div><div class="relative"><input type="checkbox" class="sr-only peer dark:bg-earth-dark dark:border-white/10 dark:text-white " checked><div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white dark:bg-earth-card after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></div></label>
              <label class="flex items-center justify-between cursor-pointer"><div><span class="font-medium text-gray-900 dark:text-white text-sm">New Bookings</span><p class="text-xs text-gray-500 dark:text-gray-300">Receive alerts for new bookings</p></div><div class="relative"><input type="checkbox" class="sr-only peer dark:bg-earth-dark dark:border-white/10 dark:text-white " checked><div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white dark:bg-earth-card after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></div></label>
              <label class="flex items-center justify-between cursor-pointer"><div><span class="font-medium text-gray-900 dark:text-white text-sm">Payment Received</span><p class="text-xs text-gray-500 dark:text-gray-300">Get notified on successful payments</p></div><div class="relative"><input type="checkbox" class="sr-only peer dark:bg-earth-dark dark:border-white/10 dark:text-white "><div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white dark:bg-earth-card after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></div></label>
              <label class="flex items-center justify-between cursor-pointer"><div><span class="font-medium text-gray-900 dark:text-white text-sm">Support Tickets</span><p class="text-xs text-gray-500 dark:text-gray-300">Alert on new support requests</p></div><div class="relative"><input type="checkbox" class="sr-only peer dark:bg-earth-dark dark:border-white/10 dark:text-white " checked><div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white dark:bg-earth-card after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></div></label>
            </div>
          </div>

          <div class="bg-white dark:bg-earth-card rounded-2xl border border-gray-100 dark:border-white/10 p-6">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Business Hours</h3>
            <div class="space-y-3">
              <div class="flex items-center justify-between"><span class="text-sm font-medium text-gray-700 dark:text-gray-300 w-24">Monday</span><input type="text" value="8:00 AM - 6:00 PM" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:border-primary outline-none w-48 dark:bg-earth-dark dark:border-white/10 dark:text-white "></div>
              <div class="flex items-center justify-between"><span class="text-sm font-medium text-gray-700 dark:text-gray-300 w-24">Tue — Fri</span><input type="text" value="8:00 AM - 6:00 PM" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:border-primary outline-none w-48 dark:bg-earth-dark dark:border-white/10 dark:text-white "></div>
              <div class="flex items-center justify-between"><span class="text-sm font-medium text-gray-700 dark:text-gray-300 w-24">Saturday</span><input type="text" value="9:00 AM - 4:00 PM" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:border-primary outline-none w-48 dark:bg-earth-dark dark:border-white/10 dark:text-white "></div>
              <div class="flex items-center justify-between"><span class="text-sm font-medium text-gray-700 dark:text-gray-300 w-24">Sunday</span><input type="text" value="Closed" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:border-primary outline-none w-48 dark:bg-earth-dark dark:border-white/10 dark:text-white "></div>
            </div>
            <button class="mt-4 px-6 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-primary-dark transition-all">Update Hours</button>
