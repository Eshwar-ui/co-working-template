<!doctype html>
<html lang="en">
  <head>
    <meta
      name="keywords"
      content="coworking space, startup hub, flexible office, meeting rooms, private office, hot desk"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon - CoWork Hub</title>
    <meta
      name="description"
      content="Something exciting is coming soon to CoWork Hub. Sign up to be notified when we launch new workspace features."
    />
    <meta property="og:title" content="Coming Soon - CoWork Hub" />
    <meta
      property="og:description"
      content="Something exciting is coming soon to CoWork Hub. Sign up to be notified when we launch new workspace features."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Coming Soon - CoWork Hub" />
    <meta
      name="twitter:description"
      content="Something exciting is coming soon to CoWork Hub. Sign up to be notified when we launch new workspace features."
    />
    <link rel="canonical" href="https://coworkhub.com/coming-soon.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3F4E3F",
              "primary-dark": "#2C362C",
              secondary: "#D4A373",
              accent: "#B3541E",
              earth: { light: "#FDFCF0", dark: "#1A1C1A", card: "#242924" },
            },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body
    class="font-sans text-gray-700 bg-earth-light dark:bg-earth-dark dark:text-gray-300 antialiased"
  >
    <div
      class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-primary-dark to-gray-900 relative overflow-hidden"
    >
      <!-- Decorative -->
      <div
        class="absolute top-20 left-20 w-72 h-72 bg-primary/10 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute bottom-20 right-20 w-96 h-96 bg-secondary/10 rounded-full blur-3xl"
      ></div>
      <div class="text-center px-6 relative z-10">
        <a
          href="../index.html"
          class="inline-flex items-center gap-2 text-2xl font-extrabold text-white mb-10"
          ><span
            class="w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center text-white text-xl"
            ><i class="fas fa-building"></i></span
          >CoWork Hub</a
        >
        <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-4">
          Something Awesome<br />is
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary"
            >Coming Soon</span
          >
        </h1>
        <p class="text-gray-400 dark:text-gray-300 max-w-lg mx-auto mb-10">
          We're working hard to bring you something incredible. Leave your email
          and be the first to know.
        </p>

        <!-- Countdown -->
        <div class="flex items-center justify-center gap-4 md:gap-6 mb-12">
          <div class="text-center">
            <div
              class="w-20 h-20 md:w-24 md:h-24 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl flex items-center justify-center text-3xl md:text-4xl font-extrabold text-white mb-2"
              id="csDays"
            >
              30
            </div>
            <span
              class="text-xs text-gray-500 dark:text-gray-300 uppercase tracking-wider"
              >Days</span
            >
          </div>
          <div class="text-center">
            <div
              class="w-20 h-20 md:w-24 md:h-24 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl flex items-center justify-center text-3xl md:text-4xl font-extrabold text-white mb-2"
              id="csHours"
            >
              12
            </div>
            <span
              class="text-xs text-gray-500 dark:text-gray-300 uppercase tracking-wider"
              >Hours</span
            >
          </div>
          <div class="text-center">
            <div
              class="w-20 h-20 md:w-24 md:h-24 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl flex items-center justify-center text-3xl md:text-4xl font-extrabold text-white mb-2"
              id="csMins"
            >
              45
            </div>
            <span
              class="text-xs text-gray-500 dark:text-gray-300 uppercase tracking-wider"
              >Minutes</span
            >
          </div>
          <div class="text-center">
            <div
              class="w-20 h-20 md:w-24 md:h-24 bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl flex items-center justify-center text-3xl md:text-4xl font-extrabold text-secondary mb-2"
              id="csSecs"
            >
              00
            </div>
            <span
              class="text-xs text-gray-500 dark:text-gray-300 uppercase tracking-wider"
              >Seconds</span
            >
          </div>
        </div>

        <!-- Email Signup -->
        <form class="max-w-md mx-auto flex gap-3 mb-8" data-validate>
          <input
            type="email"
            placeholder="Enter your email"
            class="flex-1 px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white text-sm placeholder:text-gray-500 dark:text-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition dark:bg-earth-dark dark:border-white/10 dark:text-white"
          />
          <button
            type="submit"
            class="px-6 py-3.5 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark hover:shadow-lg hover:shadow-primary/30 transition-all whitespace-nowrap"
          >
            Notify Me
          </button>
        </form>

        <!-- Social -->
        <div class="flex justify-center gap-4">
          <a
            href="#"
            class="w-10 h-10 bg-white/5 border border-white/10 rounded-lg flex items-center justify-center text-gray-400 dark:text-gray-300 hover:bg-primary hover:text-white hover:border-primary transition"
            ><i class="fab fa-twitter"></i
          ></a>
          <a
            href="#"
            class="w-10 h-10 bg-white/5 border border-white/10 rounded-lg flex items-center justify-center text-gray-400 dark:text-gray-300 hover:bg-primary hover:text-white hover:border-primary transition"
            ><i class="fab fa-linkedin-in"></i
          ></a>
          <a
            href="#"
            class="w-10 h-10 bg-white/5 border border-white/10 rounded-lg flex items-center justify-center text-gray-400 dark:text-gray-300 hover:bg-primary hover:text-white hover:border-primary transition"
            ><i class="fab fa-instagram"></i
          ></a>
        </div>
      </div>
    </div>

    <script>
      // Countdown Timer
      function updateCountdown() {
        const target = new Date();
        target.setDate(target.getDate() + 30);
        function tick() {
          const now = new Date();
          const diff = target - now;
          const d = Math.floor(diff / (1000 * 60 * 60 * 24));
          const h = Math.floor(
            (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
          );
          const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((diff % (1000 * 60)) / 1000);
          document.getElementById("csDays").textContent = String(d).padStart(
            2,
            "0",
          );
          document.getElementById("csHours").textContent = String(h).padStart(
            2,
            "0",
          );
          document.getElementById("csMins").textContent = String(m).padStart(
            2,
            "0",
          );
          document.getElementById("csSecs").textContent = String(s).padStart(
            2,
            "0",
          );
        }
        tick();
        setInterval(tick, 1000);
      }
      updateCountdown();
    </script>
  </body>
</html>
