<!doctype html>
<html lang="en">
  <head>
    <meta
      name="keywords"
      content="coworking space, startup hub, flexible office, meeting rooms, private office, hot desk"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revenue Analytics - CoWork Hub Admin</title>
    <meta
      name="description"
      content="Admin dashboard for revenue and growth analytics. Monitor income, plan distribution, and financial performance."
    />
    <meta property="og:title" content="Revenue Analytics - CoWork Hub Admin" />
    <meta property="og:type" content="website" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3F4E3F",
              "primary-dark": "#2C362C",
              secondary: "#D4A373",
              accent: "#B3541E",
              earth: { light: "#FDFCF0", dark: "#1A1C1A", card: "#242924" },
            },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="../../../favicon.ico" />
    <link rel="stylesheet" href="../../../assets/css/style.css" />
    <link rel="stylesheet" href="../../../assets/css/dark-mode.css" />
    <link rel="stylesheet" href="../../../assets/css/rtl.css" />
  </head>
  <body
    class="font-sans bg-gray-50 dark:bg-earth-dark text-gray-700 dark:text-gray-300 antialiased"
  >
    <div class="flex min-h-screen">
      <!-- Admin Sidebar -->
      <aside
        id="sidebar"
        class="w-64 bg-white dark:bg-earth-card border-r border-gray-100 dark:border-white/10 fixed h-full z-40 transition-transform -translate-x-full lg:translate-x-0 dashboard-sidebar"
      >
        <div class="p-6 border-b border-gray-100 dark:border-white/10">
          <a
            href="index.html"
            class="flex items-center gap-2 text-lg font-extrabold text-gray-900 dark:text-white"
            ><span
              class="w-9 h-9 bg-gradient-to-br from-primary to-secondary rounded-lg flex items-center justify-center text-white text-sm"
              ><i class="fas fa-building"></i></span
            >CoWork Hub</a
          >
           <span
            class="inline-block mt-2 px-2 py-0.5 bg-primary/10 text-primary border border-primary/20 text-[10px] font-bold rounded uppercase"
            >Admin Panel</span
          >
        </div>
        <nav class="p-4 space-y-1">
          <a
            href="index.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-xl transition dark:text-gray-300"
            ><i class="fas fa-th-large w-5"></i> Dashboard</a
          >
          <a
            href="users.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-xl transition dark:text-gray-300"
            ><i class="fas fa-users w-5"></i> Members</a
          >
          <a
            href="bookings.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-xl transition dark:text-gray-300"
            ><i class="fas fa-calendar-alt w-5"></i> Bookings</a
          >
          <a
            href="spaces.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-xl transition dark:text-gray-300"
            ><i class="fas fa-building w-5"></i> Spaces</a
          >
          <a
            href="analytics.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-primary bg-primary/5 rounded-xl transition dark:text-gray-300"
            ><i class="fas fa-chart-line w-5"></i> Revenue</a
          >
          <a
            href="settings.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-xl transition dark:text-gray-300"
            ><i class="fas fa-cog w-5"></i> Settings</a
          >
          <div class="pt-4 mt-4 border-t border-gray-100 dark:border-white/10">
            <a
              href="../../../index.html"
              class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-xl transition dark:text-gray-300"
              ><i class="fas fa-arrow-left w-5"></i> Back to Website</a
            >
            <a
              href="#"
              class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-red-500 hover:bg-red-50 rounded-xl transition"
              ><i class="fas fa-sign-out-alt w-5"></i> Logout</a
            >
          </div>
        </nav>
      </aside>

      <div class="flex-1 lg:ml-64">
        <header
          class="h-16 bg-white dark:bg-earth-card border-b border-gray-100 dark:border-white/10 flex items-center justify-between px-6 sticky top-0 z-30"
        >
          <div class="flex items-center gap-4">
            <button
              id="sidebarToggle"
              class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-500 dark:text-gray-300"
            >
              <i class="fas fa-bars"></i>
            </button>
            <h1 class="text-lg font-bold text-gray-900 dark:text-white">
              Revenue Analytics
            </h1>
          </div>
           <button
              id="darkToggle"
              class="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-500 dark:text-gray-300 hover:text-primary transition"
            >
              <i class="fas fa-moon"></i>
            </button>
        </header>

        <main class="p-6">
          <!-- Summary Cards -->
          <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-white dark:bg-earth-card rounded-2xl p-6 border border-gray-100 dark:border-white/10 flex items-center gap-5">
              <div class="w-14 h-14 bg-primary/10 text-primary rounded-2xl flex items-center justify-center text-2xl font-bold">
                 <i class="fas fa-coins"></i>
              </div>
              <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total Revenue</p>
                <div class="text-2xl font-extrabold text-gray-900 dark:text-white">$124,500</div>
              </div>
            </div>
            <div class="bg-white dark:bg-earth-card rounded-2xl p-6 border border-gray-100 dark:border-white/10 flex items-center gap-5">
              <div class="w-14 h-14 bg-primary/10 text-primary rounded-2xl flex items-center justify-center text-2xl font-bold">
                 <i class="fas fa-chart-area"></i>
              </div>
              <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">MRR Growth</p>
                <div class="text-2xl font-extrabold text-primary">+14.2%</div>
              </div>
            </div>
            <div class="bg-white dark:bg-earth-card rounded-2xl p-6 border border-gray-100 dark:border-white/10 flex items-center gap-5">
              <div class="w-14 h-14 bg-accent/10 text-accent rounded-2xl flex items-center justify-center text-2xl font-bold">
                 <i class="fas fa-wallet"></i>
              </div>
              <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Outstanding</p>
                <div class="text-2xl font-extrabold text-accent">$8,420</div>
              </div>
            </div>
          </div>

          <div class="grid lg:grid-cols-3 gap-8 mb-8">
            <div class="lg:col-span-2 bg-white dark:bg-earth-card rounded-2xl border border-gray-100 dark:border-white/10 p-6">
                 <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-gray-900 dark:text-white">Revenue Trend</h3>
                    <select class="text-xs font-bold bg-transparent outline-none text-gray-500">
                        <option>Last 6 Months</option>
                        <option>Last 12 Months</option>
                    </select>
                 </div>
                 <div id="revenueChart" class="w-full h-80"></div>
            </div>
            <div class="bg-white dark:bg-earth-card rounded-2xl border border-gray-100 dark:border-white/10 p-6">
                 <h3 class="font-bold text-gray-900 dark:text-white mb-6">Plan Distribution</h3>
                 <div id="planChart" class="w-full h-64"></div>
                 <div class="space-y-3 mt-6">
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-500 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-primary"></div> Enterprise</span>
                        <span class="text-xs font-bold text-gray-900 dark:text-white">45%</span>
                    </div>
                     <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-500 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-secondary"></div> Professional</span>
                        <span class="text-xs font-bold text-gray-900 dark:text-white">35%</span>
                    </div>
                     <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-500 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-accent"></div> Starter</span>
                        <span class="text-xs font-bold text-gray-900 dark:text-white">20%</span>
                    </div>
                 </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div
      id="sidebarOverlay"
      class="hidden fixed inset-0 bg-primary-dark/50 z-30 lg:hidden"
    ></div>
    <script src="../assets/js/dashboard.js"></script>
    <script>
      // Revenue Chart
      var options = {
          series: [{
          name: 'Revenue',
          data: [31, 40, 28, 51, 42, 109, 100]
        }],
          chart: {
          height: 320,
          type: 'area',
          toolbar: { show: false },
          fontFamily: 'Inter, sans-serif'
        },
        dataLabels: { enabled: false },
        stroke: { curve: 'smooth', colors: ['#3F4E3F'] },
        fill: {
            type: 'gradient',
            gradient: {
                shadeIntensity: 1,
                opacityFrom: 0.45,
                opacityTo: 0.05,
                stops: [20, 100, 100, 100]
            }
        },
        xaxis: {
          categories: ["Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"],
          axisBorder: { show: false },
          axisTicks: { show: false }
        },
        grid: { borderColor: '#f1f1f1', strokeDashArray: 4 }
      };

      var chart = new ApexCharts(document.querySelector("#revenueChart"), options);
      chart.render();

      // Plan Chart
       var optionsPlan = {
          series: [45, 35, 20],
          chart: {
          type: 'donut',
          height: 250,
        },
        labels: ['Enterprise', 'Professional', 'Starter'],
        colors: ['#3F4E3F', '#D4A373', '#B3541E'],
        legend: { show: false },
        dataLabels: { enabled: false },
        plotOptions: {
            pie: {
                donut: {
                    size: '75%'
                }
            }
        }
        };

        var chartPlan = new ApexCharts(document.querySelector("#planChart"), optionsPlan);
        chartPlan.render();
    </script>
    <script src="../../../assets/js/dashboard.js"></script>
  </body>
</html>
