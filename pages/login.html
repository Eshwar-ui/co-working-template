<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CoWork Hub</title>
  <meta name="description" content="Log in to your CoWork Hub member account to manage bookings, view invoices, and workspace settings.">
  <meta property="og:title" content="Login - CoWork Hub">
  <meta property="og:description" content="Log in to your CoWork Hub member account to manage bookings, view invoices, and workspace settings.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Login - CoWork Hub">
  <meta name="twitter:description" content="Log in to your CoWork Hub member account to manage bookings, view invoices, and workspace settings.">
  <link rel="canonical" href="https://coworkhub.com/login.html">
  
  <meta name="keywords" content="coworking space, startup hub, flexible office, meeting rooms, private office, hot desk">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#3F4E3F','primary-dark':'#2C362C',secondary:'#D4A373',accent:'#B3541E',earth:{light:'#FDFCF0',dark:'#1A1C1A',card:'#242924'}},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/dark-mode.css"><link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="font-sans bg-earth-light dark:bg-earth-dark text-gray-700 dark:text-gray-300 antialiased min-h-screen flex items-center justify-center p-6">

  <div class="max-w-md w-full bg-white dark:bg-earth-card rounded-3xl shadow-2xl overflow-hidden border border-gray-100 dark:border-white/10">
    <div class="p-8 sm:p-12">
      <div class="text-center mb-10">
        <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-extrabold text-gray-900 dark:text-white mb-6">
          <span class="w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center text-white text-lg"><i class="fas fa-building"></i></span>
          CoWork Hub
        </a>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Welcome Back</h1>
        <p class="text-gray-500 dark:text-gray-300 text-sm">Please enter your details to sign in.</p>
      </div>

      <form action="dashboard/dashboard.html" data-validate class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
          <input type="email" class="w-full px-4 py-3 bg-gray-50 dark:bg-earth-dark border border-gray-200 dark:border-white/10 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition dark:text-white" placeholder="name@company.com" required>
        </div>
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Password</label>
            <a href="#" class="text-xs font-semibold text-primary hover:underline">Forgot password?</a>
          </div>
          <input type="password" class="w-full px-4 py-3 bg-gray-50 dark:bg-earth-dark border border-gray-200 dark:border-white/10 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition dark:text-white" placeholder="••••••••" required>
        </div>
        
        <div class="flex items-center">
          <input type="checkbox" id="remember" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary/20">
          <label for="remember" class="ml-2 text-xs text-gray-500 dark:text-gray-300">Remember me for 30 days</label>
        </div>

        <button type="submit" class="w-full py-3.5 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark hover:shadow-lg hover:shadow-primary/30 transition-all">Sign In</button>
      </form>

      <div class="mt-8 pt-8 border-t border-gray-100 dark:border-white/10">
        <button class="w-full py-3 border border-gray-200 dark:border-white/10 rounded-xl flex items-center justify-center gap-3 text-sm font-semibold text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 transition mb-6">
          <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google" loading="lazy">
          Continue with Google
        </button>
        <p class="text-center text-sm text-gray-500 dark:text-gray-300">
          Don't have an account? <a href="signup.html" class="font-bold text-primary hover:underline">Sign up for free</a>
        </p>
      </div>
    </div>
  </div>

  <div class="fixed top-8 right-8 flex gap-3">
    <button id="rtlToggle" class="px-3 py-1.5 text-[10px] font-bold border border-gray-200 text-gray-500 dark:text-gray-300 rounded-lg hover:border-primary hover:text-primary transition uppercase tracking-wider">RTL</button>
    <button id="darkToggle" class="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-500 dark:text-gray-300 hover:text-primary transition"><i class="fas fa-moon"></i></button>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
